services:
  mysql:
    image: mysql:8.4
    container_name: grocery-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init/10-import-data.sh:/docker-entrypoint-initdb.d/10-import-data.sh:ro
      - ./GROCERY_USER.sql:/docker-entrypoint-initdb.d/GROCERY_USER.sql.in:ro
      - ./ADMIN_GROCERY.sql:/docker-entrypoint-initdb.d/ADMIN_GROCERY.sql.in:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12

  customer:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-saim687}/grocery-customer:latest
    container_name: grocery-customer
    command: ["node", "index_customer.js"]
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_NAME: GROCERY_USER
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_PORT: 3306
      JWT_SECRET: your_secret_jwt_key
      NODE_ENV: production
    ports:
      - "3000:3000"

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-saim687}/grocery-admin:latest
    container_name: grocery-admin
    command: ["node", "index_admin.js"]
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_NAME: ADMIN_GROCERY
      DATABASE_HOST: mysql
      DATABASE_USER: root
      DATABASE_PASSWORD: root
      DATABASE_PORT: 3306
      JWT_SECRET: your_secret_jwt_key
      NODE_ENV: production
    ports:
      - "3001:3001"

volumes:
  mysql_data:
