services:
  mysql_part2:
    image: mysql:8.4
    container_name: grocery-mysql-part2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "4307:3306"
    volumes:
      - mysql_data_part2:/var/lib/mysql
      - ./docker/mysql/init/10-import-data.sh:/docker-entrypoint-initdb.d/10-import-data.sh:ro
      - ./GROCERY_USER.sql:/docker-entrypoint-initdb.d/GROCERY_USER.sql.in:ro
      - ./ADMIN_GROCERY.sql:/docker-entrypoint-initdb.d/ADMIN_GROCERY.sql.in:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12

  customer_part2:
    image: node:20-alpine
    container_name: grocery-customer-part2
    working_dir: /app
    command: sh -c "npm ci && node index_customer.js"
    restart: unless-stopped
    depends_on:
      mysql_part2:
        condition: service_healthy
    environment:
      DB_NAME: GROCERY_USER
      DB_HOST: mysql_part2
      DB_USER: root
      DB_PASSWORD: root
      DB_PORT: 3306
      JWT_SECRET: your_secret_jwt_key
      NODE_ENV: production
    ports:
      - "4000:3000"
    volumes:
      - ./:/app

  admin_part2:
    image: node:20-alpine
    container_name: grocery-admin-part2
    working_dir: /app
    command: sh -c "npm ci && node index_admin.js"
    restart: unless-stopped
    depends_on:
      mysql_part2:
        condition: service_healthy
    environment:
      DATABASE_NAME: ADMIN_GROCERY
      DATABASE_HOST: mysql_part2
      DATABASE_USER: root
      DATABASE_PASSWORD: root
      DATABASE_PORT: 3306
      JWT_SECRET: your_secret_jwt_key
      NODE_ENV: production
    ports:
      - "4001:3001"
    volumes:
      - ./:/app

volumes:
  mysql_data_part2:
